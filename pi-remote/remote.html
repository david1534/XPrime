<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="X Remote">
    <meta name="theme-color" content="#0d0d0d">
    <title>X Prime Remote</title>
    <link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoiWCBQcmltZSBSZW1vdGUiLCJzaG9ydF9uYW1lIjoiWCBSZW1vdGUiLCJzdGFydF91cmwiOiIvIiwiZGlzcGxheSI6InN0YW5kYWxvbmUiLCJiYWNrZ3JvdW5kX2NvbG9yIjoiIzBkMGQwZCIsInRoZW1lX2NvbG9yIjoiIzBkMGQwZCJ9">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0; padding: 0;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        html, body {
            height: 100%; width: 100%;
            overscroll-behavior: none;
            overflow: hidden;
            background: #0d0d0d;
        }
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: env(safe-area-inset-top, 12px) 0 env(safe-area-inset-bottom, 12px);
            user-select: none;
            -webkit-user-select: none;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
            color: #fff;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 0 8px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: #555;
        }
        .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #c0392b;
            transition: background 0.4s;
        }
        .status-dot.connected { background: #27ae60; }

        /* Remote layout */
        .remote {
            flex: 1;
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 16px 8px;
            overflow: hidden;
            gap: 0;
        }

        /* Top row */
        .top-row {
            display: flex;
            width: 100%;
            gap: 8px;
            margin-bottom: 10px;
        }
        .top-row button {
            flex: 1;
            height: 38px;
            background: #1e1e1e;
            border: 1px solid #2c2c2c;
            border-radius: 19px;
            color: #aaa;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
            transition: background 0.1s, transform 0.08s;
        }
        .top-row button:active { background: #2e2e2e; transform: scale(0.95); }

        /* D-pad */
        .dpad-wrap {
            position: relative;
            width: min(58vw, 240px);
            aspect-ratio: 1;
            margin-bottom: 10px;
        }
        .dpad-ring {
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: #1a1a1a;
            border: 1px solid #2c2c2c;
            box-shadow: 0 4px 24px rgba(0,0,0,0.5);
        }
        .dpad-ring::before, .dpad-ring::after {
            content: '';
            position: absolute;
            background: #2c2c2c;
        }
        .dpad-ring::before { width: 1px; height: 100%; left: 50%; transform: translateX(-50%); }
        .dpad-ring::after  { height: 1px; width: 100%; top: 50%; transform: translateY(-50%); }

        .dpad-wrap button {
            position: absolute;
            background: transparent;
            border: none;
            color: #ccc;
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: color 0.1s, transform 0.08s;
        }
        .dpad-up    { top: 0;    left: 50%; transform: translateX(-50%);  width: 33.3%; height: 33.3%; }
        .dpad-down  { bottom: 0; left: 50%; transform: translateX(-50%);  width: 33.3%; height: 33.3%; }
        .dpad-left  { left: 0;  top: 50%;  transform: translateY(-50%);  width: 33.3%; height: 33.3%; }
        .dpad-right { right: 0; top: 50%;  transform: translateY(-50%);  width: 33.3%; height: 33.3%; }
        .dpad-up:active    { color: #fff; transform: translateX(-50%) scale(0.85); }
        .dpad-down:active  { color: #fff; transform: translateX(-50%) scale(0.85); }
        .dpad-left:active  { color: #fff; transform: translateY(-50%) scale(0.85); }
        .dpad-right:active { color: #fff; transform: translateY(-50%) scale(0.85); }

        .dpad-ok {
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 36%; height: 36%;
            background: #1e3a6e !important;
            border: 1px solid #2a5298 !important;
            border-radius: 50% !important;
            font-size: 16px !important;
            font-weight: 700 !important;
            color: #fff !important;
            box-shadow: 0 0 0 3px #0d0d0d;
        }
        .dpad-ok:active { background: #2a5298 !important; transform: translate(-50%, -50%) scale(0.92) !important; }

        /* Play/Pause */
        .playpause {
            width: 100%;
            height: 46px;
            background: #1a2e1a;
            border: 1px solid #2a4a2a;
            border-radius: 23px;
            color: #5cdb5c;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-weight: 600;
            margin-bottom: 8px;
            transition: background 0.1s, transform 0.08s;
        }
        .playpause span { font-size: 12px; color: #aaa; font-weight: 500; }
        .playpause:active { background: #2a4a2a; transform: scale(0.97); }

        /* Mid row: scroll */
        .mid-row {
            display: flex;
            width: 100%;
            gap: 8px;
            margin-bottom: 8px;
        }
        .mid-row button {
            flex: 1;
            height: 40px;
            background: #1e1e1e;
            border: 1px solid #2c2c2c;
            border-radius: 12px;
            color: #ccc;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.1s, transform 0.08s;
        }
        .mid-row button:active { background: #2e2e2e; transform: scale(0.95); }

        /* Utility row */
        .util-row {
            display: flex;
            width: 100%;
            gap: 8px;
            margin-bottom: 8px;
        }
        .util-row button {
            flex: 1;
            height: 36px;
            background: #161616;
            border: 1px solid #252525;
            border-radius: 9px;
            color: #666;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            letter-spacing: 0.5px;
            transition: background 0.1s, transform 0.08s;
        }
        .util-row button:active { background: #252525; transform: scale(0.95); color: #aaa; }
        #keyboardBtn { font-size: 16px; color: #555; }
        #keyboardBtn:active { color: #aaa; }

        /* Touchpad */
        .touchpad-label {
            font-size: 10px;
            color: #333;
            text-align: center;
            margin-bottom: 5px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .touchpad {
            width: 100%;
            flex: 1;
            min-height: 160px;
            background: #141414;
            border: 1px solid #222;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #2a2a2a;
            font-size: 28px;
            position: relative;
            overflow: hidden;
        }

        /* Keyboard overlay */
        .keyboard-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.65);
            z-index: 100;
            align-items: flex-end;
        }
        .keyboard-overlay.open { display: flex; }
        .keyboard-panel {
            width: 100%;
            background: #161616;
            border-top: 1px solid #2c2c2c;
            border-radius: 20px 20px 0 0;
            padding: 12px 20px calc(16px + env(safe-area-inset-bottom, 0px));
            transform: translateY(100%);
            transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
        }
        .keyboard-overlay.open .keyboard-panel { transform: translateY(0); }
        .keyboard-handle {
            width: 36px; height: 4px;
            background: #333;
            border-radius: 2px;
            margin: 0 auto 14px;
        }
        .keyboard-label {
            font-size: 11px;
            color: #555;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        .keyboard-input-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .keyboard-input {
            flex: 1;
            height: 48px;
            background: #222;
            border: 1px solid #333;
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            padding: 0 14px;
            outline: none;
            caret-color: #4a8aff;
            touch-action: auto;
        }
        .keyboard-input:focus { border-color: #4a8aff; }
        .keyboard-send {
            height: 48px; width: 48px;
            background: #1e3a6e;
            border: 1px solid #2a5298;
            border-radius: 12px;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background 0.1s, transform 0.08s;
        }
        .keyboard-send:active { background: #2a5298; transform: scale(0.93); }
    </style>
</head>
<body>
    <div class="header">
        <div class="status-dot" id="statusDot"></div>
        <span>X Prime</span>
    </div>

    <div class="remote">
        <!-- Top: Back / Close / Fullscreen -->
        <div class="top-row">
            <button data-action="back">&#8592; Back</button>
            <button data-action="escape">✕ Close</button>
            <button data-action="fullscreen">&#9974; Full</button>
        </div>

        <!-- D-pad -->
        <div class="dpad-wrap">
            <div class="dpad-ring"></div>
            <button class="dpad-up"    data-action="up">&#9650;</button>
            <button class="dpad-left"  data-action="left">&#9664;</button>
            <button class="dpad-ok"    data-action="select">OK</button>
            <button class="dpad-right" data-action="right">&#9654;</button>
            <button class="dpad-down"  data-action="down">&#9660;</button>
        </div>

        <!-- Play / Pause -->
        <button class="playpause" data-action="playpause">
            &#9199; <span>Play / Pause</span>
        </button>

        <!-- Scroll -->
        <div class="mid-row">
            <button data-action="scroll_up">&#9650;</button>
            <button data-action="scroll_down">&#9660;</button>
        </div>

        <!-- Utility -->
        <div class="util-row">
            <button data-action="tab">TAB</button>
            <button data-action="reload">RELOAD</button>
            <button data-action="restart_browser" id="restartBtn">↺</button>
            <button id="keyboardBtn">⌨</button>
            <button id="refreshRemoteBtn" title="Refresh remote">⟳</button>
        </div>

        <!-- Touchpad -->
        <div class="touchpad-label">Touchpad · drag to move · tap to click</div>
        <div class="touchpad" id="touchpad">&#8982;</div>
    </div>

    <!-- Keyboard overlay -->
    <div class="keyboard-overlay" id="keyboardOverlay">
        <div class="keyboard-panel">
            <div class="keyboard-handle"></div>
            <div class="keyboard-label">Type on TV</div>
            <div class="keyboard-input-row">
                <input class="keyboard-input" id="keyboardInput" type="text"
                    placeholder="Type something…"
                    autocomplete="off" autocorrect="off"
                    autocapitalize="off" spellcheck="false">
                <button class="keyboard-send" id="keyboardSend">&#9166;</button>
            </div>
        </div>
    </div>

    <script>
        // WebSocket
        const statusDot = document.getElementById("statusDot");
        let ws = null, reconnectTimer = null;

        function connect() {
            const proto = location.protocol === "https:" ? "wss:" : "ws:";
            ws = new WebSocket(`${proto}//${location.host}/ws`);
            ws.onopen = () => {
                statusDot.classList.add("connected");
                clearTimeout(reconnectTimer);
                reconnectTimer = null;
            };
            ws.onclose = () => {
                statusDot.classList.remove("connected");
                if (!reconnectTimer) reconnectTimer = setTimeout(() => { reconnectTimer = null; connect(); }, 2000);
            };
            ws.onerror = () => ws.close();
        }

        function send(data) {
            if (ws && ws.readyState === WebSocket.OPEN) {
                ws.send(JSON.stringify(data));
                if (navigator.vibrate) navigator.vibrate(8);
            }
        }

        // Button handlers
        document.querySelectorAll("[data-action]").forEach(btn => {
            btn.addEventListener("pointerdown", e => {
                e.preventDefault();
                send({ action: btn.dataset.action });
            });
        });

        // Keyboard
        const overlay = document.getElementById("keyboardOverlay");
        const keyboardInput = document.getElementById("keyboardInput");

        document.getElementById("refreshRemoteBtn").addEventListener("pointerdown", e => {
            e.preventDefault();
            window.location.reload();
        });

        document.getElementById("keyboardBtn").addEventListener("pointerdown", e => {
            e.preventDefault();
            overlay.classList.add("open");
            setTimeout(() => keyboardInput.focus(), 350);
        });

        overlay.addEventListener("pointerdown", e => {
            if (e.target === overlay) overlay.classList.remove("open");
        });

        function sendText() {
            const text = keyboardInput.value;
            if (text.trim()) {
                send({ action: "type", text });
                keyboardInput.value = "";
            }
            overlay.classList.remove("open");
        }

        document.getElementById("keyboardSend").addEventListener("pointerdown", e => {
            e.preventDefault();
            sendText();
        });

        keyboardInput.addEventListener("keydown", e => {
            if (e.key === "Enter") sendText();
        });

        // Touchpad
        const touchpad = document.getElementById("touchpad");
        let tx = 0, ty = 0, moved = false;

        touchpad.addEventListener("touchstart", e => {
            e.preventDefault();
            tx = e.touches[0].clientX;
            ty = e.touches[0].clientY;
            moved = false;
        }, { passive: false });

        touchpad.addEventListener("touchmove", e => {
            e.preventDefault();
            const dx = e.touches[0].clientX - tx;
            const dy = e.touches[0].clientY - ty;
            if (Math.abs(dx) > 2 || Math.abs(dy) > 2) {
                moved = true;
                send({ action: "mouse_move", dx: Math.round(dx * 5), dy: Math.round(dy * 5) });
                tx = e.touches[0].clientX;
                ty = e.touches[0].clientY;
            }
        }, { passive: false });

        touchpad.addEventListener("touchend", e => {
            e.preventDefault();
            if (!moved) send({ action: "mouse_click" });
        }, { passive: false });

        connect();
    </script>
</body>
</html>
